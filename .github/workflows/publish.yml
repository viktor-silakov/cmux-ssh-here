name: Publish to npm

# Trusted Publishing (OIDC): no npm token, no OTP — auth comes from GitHub's
# OIDC identity, and provenance is attached automatically.
# One-time setup on npmjs.com: package → Settings → Trusted Publisher →
#   Publisher: GitHub Actions
#   Organization or user: viktor-silakov
#   Repository: cmux-ssh-here
#   Workflow filename: publish.yml
# Then release with:  npm version patch && git push --follow-tags
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest # trusted publishing needs a cloud runner, not self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm install -g npm@latest # trusted publishing requires npm >= 11.5.1
      - run: npm ci
      - run: npm test
      - name: Publish if this version is new
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "cmux-ssh-here@$VERSION" version >/dev/null 2>&1; then
            echo "cmux-ssh-here@$VERSION already published — skipping."
          else
            npm publish --access public # OIDC handles auth; provenance is automatic
          fi
